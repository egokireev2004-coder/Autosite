<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Импорт данных</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
        pre  { background: #f4f4f4; padding: 16px; border-radius: 8px; white-space: pre-wrap; }
        button { padding: 12px 24px; background: #4f46e5; color: white; border: none;
                 border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #4338ca; }
        .warn { color: #b45309; margin-bottom: 16px; }
    </style>
</head>
<body>
    <h2>Импорт данных из Excel</h2>
    <p class="warn">Внимание: импорт удаляет старые данные и загружает заново. Занимает 1–3 минуты.</p>

    <form method="post" action="/admin/import">
        <button type="submit">Запустить импорт</button>
    </form>

    <div th:if="${log}" style="margin-top: 24px;">
        <h3>Результат:</h3>
        <pre th:text="${log}"></pre>
    </div>
</body>
</html>
